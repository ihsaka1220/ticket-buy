<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演出门票抢购系统 - 首页</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">演出票务</div>
            <nav class="nav">
                <a href="index.html" class="active">首页</a>
                <a href="orders.html">我的订单</a>
            </nav>
            <div class="user-area" id="userArea">
                <button class="btn btn-primary" onclick="showLoginModal()">登录</button>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <h1>热门演出 即将开抢</h1>
            <p>脱口秀 · 音乐会 · 演唱会 · 话剧</p>
        </section>

        <section class="categories">
            <div class="container">
                <div class="category-tabs">
                    <button class="tab active" data-category="">全部</button>
                    <button class="tab" data-category="1">脱口秀</button>
                    <button class="tab" data-category="2">音乐会</button>
                    <button class="tab" data-category="3">演唱会</button>
                    <button class="tab" data-category="4">话剧</button>
                </div>
            </div>
        </section>

        <section class="events">
            <div class="container">
                <div class="event-grid" id="eventGrid">
                    <!-- Events will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close" onclick="hideLoginModal()">&times;</span>
            <h2>用户登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <p class="register-link">还没有账号？<a href="#" onclick="showRegisterModal()">立即注册</a></p>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close" onclick="hideRegisterModal()">&times;</span>
            <h2>用户注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" required placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="regPhone" required placeholder="请输入手机号">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <p class="register-link">已有账号？<a href="#" onclick="showLoginModal()">立即登录</a></p>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 演出门票抢购系统 - 仅供学习使用</p>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
