server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ticket-buy-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ticket_buy?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:ticket123}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6380}
      password: ${SPRING_DATA_REDIS_PASSWORD:redis123}
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 3000ms
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ticket-buy-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  cache:
    type: redis
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ticketbuy.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Alipay Configuration
alipay:
  app-id: ${ALIPAY_APP_ID:9021000162651598}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}
  gateway: ${ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://qf47df9c.natappfree.cc/api/pay/callback}
  return-url: ${ALIPAY_RETURN_URL:http://qf47df9c.natappfree.cc/order-result}
  sign-type: RSA2
  charset: UTF-8
  format: json
  # 模拟支付模式（没有真实支付宝配置时使用）
  mock-mode: ${ALIPAY_MOCK_MODE:false}

# Custom Configuration
ticket:
  max-buy-per-user: 3
  order-timeout-minutes: 15
  cache:
    l1-ttl: 300
    l2-ttl: 3600
    null-value-ttl: 120
  rate-limit:
    global-window: 60
    global-max: 10000
    ip-window: 60
    ip-max: 100
    user-window: 60
    user-max: 20

logging:
  level:
    com.ticketbuy: DEBUG
    org.springframework.kafka: INFO
